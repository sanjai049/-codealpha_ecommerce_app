<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaMart | Premium Electronics</title>
    <meta name="description"
        content="Discover premium electronics with sleek design and cutting-edge technology at Aura.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div id="toast-container"></div>

    <nav class="navbar">
        <div class="nav-left" style="display: flex; align-items: center; gap: 2rem;">
            <div class="nav-brand" onclick="app.navigate('home')">
                NexaMart<span>.</span>
            </div>
            <div class="category-dropdown-container">
                <select id="category-select" class="category-select" onchange="app.filterByCategory(this.value)">
                    <option value="All Products">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Gadgets">Gadgets</option>
                    <option value="Home & Garden">Home & Garden</option>
                </select>
                <svg class="dropdown-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
        </div>
        <div class="nav-search">
            <div class="search-input-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="search-icon">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search products..."
                    onkeyup="app.filterProducts(event)">
            </div>
        </div>
        <div class="nav-actions">
            <div id="auth-actions" style="display: flex; gap: 1rem; align-items: center;">
                <!-- Dynamically populated login/register or logout buttons -->
            </div>
            <div class="cart-wishlist-group"
                style="display: flex; gap: 1rem; align-items: center; border-left: 2px solid var(--surface-border); padding-left: 1.5rem;">
                <button class="icon-btn wishlist-btn" onclick="app.toggleWishlist()" title="Wishlist">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                        </path>
                    </svg>
                </button>
                <button class="cart-btn icon-btn" onclick="app.toggleCart()" title="Cart">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span id="cart-count">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main id="app-container">
        <!-- Views will be injected here dynamically -->
    </main>

    <!-- Cart Overlay -->
    <div id="cart-overlay" class="overlay hidden">
        <div class="cart-panel glass">
            <div class="cart-header">
                <h2>Your Cart</h2>
                <button class="close-btn" onclick="app.toggleCart()">&times;</button>
            </div>
            <div id="cart-items" class="cart-items">
                <!-- Cart items injected here -->
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cart-total-price">$0.00</span>
                </div>
                <button id="checkout-btn" class="btn btn-primary btn-block" onclick="app.checkout()">Checkout</button>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="overlay hidden">
        <div class="auth-panel glass">
            <button class="close-btn" onclick="app.toggleAuthModal()">&times;</button>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="app.switchAuthTab('login')">Login</button>
                <button class="tab-btn" onclick="app.switchAuthTab('register')">Register</button>
            </div>
            <div id="login-view" class="auth-form-view">
                <form id="login-form" onsubmit="app.handleLogin(event)">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                </form>
            </div>
            <div id="register-view" class="auth-form-view hidden">
                <form id="register-form" onsubmit="app.handleRegister(event)">
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email (Gmail)</label>
                        <input type="email" id="reg-email" placeholder="example@gmail.com" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-confirm-password">Confirm Password</label>
                        <input type="password" id="reg-confirm-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 NexaMart Electronics. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
